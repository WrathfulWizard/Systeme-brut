<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;"
    />
    <title>Ashbound</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07060a;
        overflow: hidden;
        cursor: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      /* Crisp pixels, no smoothing on upscale. */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script src="bundle.js"></script>
  </body>
</html>
